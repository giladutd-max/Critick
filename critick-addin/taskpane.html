<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CriTick</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF9F6; --panel:#FFFFFF; --ink:#1C1B1A; --muted:#8A867E; --line:#E7E4DD;
    --pin:#A83254; --pin-soft:#F7E6EC; --done:#2E7D5B; --done-soft:#E4F0EA;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:'Heebo',system-ui,sans-serif; background:var(--bg); color:var(--ink); font-size:14px; display:flex; flex-direction:column;}

  header{padding:12px 14px 10px; background:var(--panel); border-bottom:1px solid var(--line); position:relative;}
  header .brand{font-weight:700; font-size:16px;}
  header .brand span{color:var(--pin);}
  header .sub{font-size:11px; color:var(--muted); margin-top:2px;}

  #mebar{display:none; align-items:center; gap:6px; padding:7px 14px; background:var(--panel); border-bottom:1px solid var(--line); font-size:12px; flex-wrap:wrap;}
  #mebar .pdot{width:9px; height:9px; border-radius:50%; display:inline-block; flex:none;}
  #mebar.on{display:flex;}
  #mebar .mine-btn{font-family:inherit; font-size:11px; font-weight:500; border:1px solid var(--pin); color:var(--pin); background:var(--panel); border-radius:8px; padding:2px 8px; cursor:pointer;}
  #mebar .mine-btn:hover{background:var(--pin); color:#fff;}
  #mebar .who-chip{font-family:inherit; font-size:11px; border:1px solid var(--line); border-radius:12px; padding:2px 9px; cursor:pointer; background:var(--panel);}
  #mebar .who-chip:hover{border-color:var(--pin);}

  #composerbox{padding:12px 14px 10px; background:var(--panel); border-bottom:1px solid var(--line);}
  #anchor{font-size:11px; color:var(--muted); margin-bottom:6px; min-height:15px;}
  #anchor b{color:var(--pin); font-weight:500;}
  #noteinput{width:100%; font-family:inherit; font-size:14px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; outline:none; background:var(--bg);}
  #noteinput:focus{border-color:var(--pin);}
  #people{display:flex; flex-wrap:wrap; gap:6px; padding:8px 0 2px;}
  .chip{flex:none; display:flex; align-items:center; gap:5px; font-size:11px; border:1px solid var(--line); border-radius:12px; padding:3px 9px; cursor:pointer; background:var(--panel); font-family:inherit; color:var(--ink);}
  .chip .dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .chip.sel{border-color:var(--ink); background:var(--bg); font-weight:500;}
  #newperson{width:80px; font-family:inherit; font-size:11px; border:1px solid var(--line); border-radius:12px; padding:3px 9px; outline:none; display:none;}
  #addbtn{width:100%; margin-top:8px; font-family:inherit; font-size:13px; font-weight:500; background:var(--ink); color:#fff; border:none; border-radius:8px; padding:8px; cursor:pointer;}
  #addbtn:hover{background:#333;}
  #addbtn:disabled{opacity:.5; cursor:default;}

  #filterbar{display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--panel); border-bottom:1px solid var(--line);}
  #filterbar label{font-size:11px; color:var(--muted);}
  #filterPerson{flex:1; font-family:inherit; font-size:12px; border:1px solid var(--line); border-radius:8px; padding:4px 6px; background:var(--bg); outline:none; min-width:0;}
  #progress{font-size:11px; color:var(--muted); white-space:nowrap;}
  #progress b{color:var(--done); font-weight:500;}

  #notes{flex:1; overflow-y:auto;}
  .slidehead{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; padding:12px 14px 4px; cursor:pointer;}
  .slidehead:hover{color:var(--pin);}
  .empty{padding:12px 14px; color:var(--muted); font-size:12px; line-height:1.5; text-align:center;}
  .note{display:flex; gap:8px; padding:8px 14px; align-items:flex-start; cursor:pointer;}
  .note:hover{background:var(--pin-soft);}
  .note.hl{background:var(--pin-soft); box-shadow:inset 3px 0 0 var(--pin);}
  .note .num{flex:none; width:20px; height:20px; border-radius:50%; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .note .body{flex:1; min-width:0;}
  .note .txt{font-size:13px; line-height:1.45; word-wrap:break-word; unicode-bidi:plaintext;}
  .note.st-fixed .txt{color:var(--muted); text-decoration:line-through;}
  .txt-edit{width:100%; font-family:inherit; font-size:13px; border:1px solid var(--pin); border-radius:6px; padding:3px 6px; outline:none;}
  .note .meta{font-size:11px; color:var(--muted); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap;}
  .note .meta .pdot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .note .meta .assign{cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
  .note .meta .assign:hover{color:var(--ink); text-decoration:underline;}
  .assign-sel{font-family:inherit; font-size:11px; border:1px solid var(--line); border-radius:6px; background:var(--panel);}
  .note .meta .st{font-weight:500;}
  .note .st.fixed{color:var(--done);}
  .note .tag{display:inline-block; font-size:10px; color:var(--muted); background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:0 5px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .note .acts{flex:none; display:flex; gap:0;}
  .note .acts button{border:none; background:none; padding:2px 3px; font-size:13px; color:var(--muted); cursor:pointer; font-family:inherit; line-height:1;}
  .note .acts button:hover{color:var(--ink);}
  .note .acts .eye.off{opacity:.35;}
  .note .acts .st-btn:hover{color:var(--done);}
  .note .acts .del:hover{color:var(--pin);}

  footer{padding:10px 14px; background:var(--panel); border-top:1px solid var(--line);}
  footer .row{display:flex; gap:8px;}
  footer button{flex:1; font-family:inherit; font-size:12px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:6px; cursor:pointer; color:var(--ink);}
  footer button:hover{border-color:#C9C5BC;}
  #savedflag{font-size:10px; color:var(--muted); text-align:center; margin-top:6px; min-height:13px;}

  #claudebox{display:none; position:fixed; inset:0; background:rgba(28,27,26,.45); z-index:50; padding:20px 14px; }
  #claudebox.on{display:flex; flex-direction:column; gap:8px;}
  #claudebox .inner{background:var(--panel); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:8px; flex:1; min-height:0;}
  #claudebox textarea{flex:1; min-height:0; width:100%; font-family:ui-monospace,Menlo,monospace; font-size:11px; line-height:1.5; border:1px solid var(--line); border-radius:8px; padding:8px; resize:none; outline:none; background:var(--bg);}
  #claudebox .hint{font-size:11px; color:var(--muted); text-align:center;}
  #toast{position:fixed; bottom:64px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:12px; padding:6px 14px; border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:99; white-space:nowrap;}
  #toast.on{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="brand">Cri<span>Tick</span></div>
  <div class="sub" id="sub"></div>
</header>

<div id="mebar"></div>

<div id="composerbox">
  <div id="anchor"></div>
  <input id="noteinput" type="text" dir="auto">
  <div id="people"></div>
  <button id="addbtn"></button>
</div>

<div id="filterbar">
  <label for="filterPerson" id="filterLabel"></label>
  <select id="filterPerson"></select>
  <span id="progress"></span>
</div>

<div id="notes"></div>

<footer>
  <div class="row">
    <button id="copyClaude"></button>
    <button id="clearPins"></button>
  </div>
  <div id="savedflag"></div>
</footer>

<div id="claudebox"><div class="inner"><textarea id="claudetext" readonly></textarea><div class="hint" id="claudehint"></div></div></div>

<div id="toast"></div>

<script>
const KEY = 'critick-notes';
const KEY_PEOPLE = 'critick-people';
const PIN = '#A83254', SELF = '#6E6B64';
const ROSTER = {
  'Gilad':'#A83254','Noa':'#2563EB','Issi':'#0E9F6E','Merav':'#D97706','Daniel':'#7C3AED',
  'Maya':'#DB2777','Adi':'#0891B2','Tsofit':'#65A30D','Michal':'#92400E'
};
let notes = [];
let people = {};
let slidePos = {};
let ready = false;
let selPerson = '';
let filterP = '';
let undoStack = [];
let lastOp = 0;
let me = '';
let lang = 'en';

const $ = id => document.getElementById(id);

/* ================= i18n ================= */
const STR = {
  en: {
    sub: 'Corrections are saved inside this presentation',
    notPpt: 'CriTick runs inside PowerPoint',
    anchorDefault: 'A numbered pin will be added to the slide — drag it into place',
    anchorAttached: 'Attached to: ',
    anchorPin: 'Pin selected',
    placeholder: 'Write the correction… (Enter to add)',
    addSlide: 'Add to this slide',
    addObject: 'Add note on this object',
    myself: 'Myself',
    addPerson: 'Add a person',
    personName: 'Name',
    filterLabel: 'Show',
    everyone: 'Everyone',
    emptyNew: 'Write a correction, press Enter — then drag the pin into place.',
    emptyFilter: 'No notes for this filter.',
    slideWord: 'Slide',
    slideMeta: 'slide',
    deletedSlide: 'Deleted slide',
    fixedLabel: '👍 fixed',
    reassignTip: 'Click to reassign',
    eyeTip: 'Hide/show the pin on the slide',
    fixTip: 'Mark fixed — the pin leaves the slide',
    reopenTip: 'Reopen — the pin returns',
    delTip: 'Delete note',
    editTip: 'Double-click to edit',
    clearPins: 'Remove pins from slides',
    clearPinsTip: 'Delete all CriTick pins from the slides (notes stay)',
    saved: 'Saved in this file · save the presentation to keep it',
    open: 'open',
    fixedWord: 'fixed',
    forYou: n => n + ' open ' + (n === 1 ? 'note' : 'notes') + ' for you',
    nothingForYou: 'nothing open for you',
    showMine: 'Show mine',
    change: 'change',
    whoami: 'Who are you?',
    goSlide: 'Go to slide',
    tClickSlide: 'Click a slide first',
    tCouldNotAdd: 'Could not add the note — try again',
    tNoPins: 'No pins on the slides',
    tPinsRemoved: n => n + ' pins removed — notes kept',
    tCantRemove: 'Could not remove pins',
    tGoneOne: 'Note deleted with its pin',
    tGoneMany: n => n + ' notes deleted with their pins',
    tUndone: 'Undone',
    tNothingUndo: 'Nothing to undo',
    tCantUndo: 'Could not undo',
    copyClaude: 'Copy for Claude',
    copyClaudeTip: 'Copy all open corrections as instructions to paste into the Claude pane',
    tNothingOpen: 'No open corrections',
    tClaudeCopied: 'Copied — paste into the Claude pane',
    copyHint: 'Press ⌘C to copy, then paste into the Claude pane · Esc to close'
  }
};
function t(key){ return STR[lang][key]; }

function applyLang(){
  $('sub').textContent = t('sub');
  $('noteinput').placeholder = t('placeholder');
  $('filterLabel').textContent = t('filterLabel');
  $('clearPins').textContent = t('clearPins');
  $('clearPins').title = t('clearPinsTip');
  $('copyClaude').textContent = t('copyClaude');
  $('copyClaude').title = t('copyClaudeTip');
  drawPeople();
  drawMeBar();
  drawNotes();
  updateAnchor();
}

/* ================= boot ================= */
Office.onReady(info => {
  try{ me = localStorage.getItem('critick-me') || ''; }catch(e){}
  if (info.host !== Office.HostType.PowerPoint){
    applyLang();
    $('sub').textContent = t('notPpt');
    return;
  }
  ready = true;
  try{
    const raw = Office.context.document.settings.get(KEY);
    if (raw) notes = JSON.parse(raw);
  }catch(e){}
  try{
    const rawP = Office.context.document.settings.get(KEY_PEOPLE);
    if (rawP) people = JSON.parse(rawP);
  }catch(e){}
  Object.keys(ROSTER).forEach(n => { if (!people[n]) people[n] = ROSTER[n]; });
  let mx = 0;
  notes.forEach(n => { if (n.pinNum > mx) mx = n.pinNum; });
  notes.forEach(n => {
    if (!n.pinNum) n.pinNum = ++mx;
    if (!n.uid) n.uid = 'm' + n.ts;
    if (!n.status) n.status = n.done ? 'fixed' : 'open';
    if (n.status === 'canceled') n.status = 'fixed';
    if (n.status === 'question') n.status = 'open';
    delete n.done;
    if (n.person === undefined) n.person = '';
    if (n.hidden === undefined) n.hidden = false;
    if (n.filterHidden === undefined) n.filterHidden = false;
  });
  applyLang();
  refreshSlideMap().then(async () => { drawNotes(); await applyFilterPins(); });
  watchSelection();
});

/* ================= me bar ================= */
function drawMeBar(){
  const bar = $('mebar');
  bar.innerHTML = '';
  if (!ready){ bar.classList.remove('on'); return; }
  if (!me){
    bar.classList.add('on');
    const q = document.createElement('span');
    q.textContent = t('whoami');
    bar.appendChild(q);
    Object.keys(people).forEach(name => {
      const b = document.createElement('button');
      b.className = 'who-chip';
      b.textContent = name;
      b.addEventListener('click', () => {
        me = name;
        try{ localStorage.setItem('critick-me', me); }catch(e){}
        drawMeBar();
      });
      bar.appendChild(b);
    });
    return;
  }
  const mine = notes.filter(n => n.person === me && n.status === 'open').length;
  bar.classList.add('on');
  const wave = document.createElement('span');
  wave.textContent = '👋';
  bar.appendChild(wave);
  const d = document.createElement('span');
  d.className = 'pdot';
  d.style.background = ensureColor(me);
  bar.appendChild(d);
  const txt = document.createElement('span');
  txt.textContent = me + ' · ' + (mine ? t('forYou')(mine) : t('nothingForYou'));
  bar.appendChild(txt);
  if (mine){
    const btn = document.createElement('button');
    btn.className = 'mine-btn';
    btn.textContent = t('showMine');
    btn.addEventListener('click', async () => {
      filterP = me;
      $('filterPerson').value = me;
      drawNotes();
      await applyFilterPins();
      persist();
    });
    bar.appendChild(btn);
  }
}

/* ================= people & colors ================= */
function hashColor(name){
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return 'hsl(' + (h % 360) + ' 62% 38%)';
}
function ensureColor(name){
  if (!people[name]){ people[name] = hashColor(name); persistPeople(); }
  return people[name];
}
function personColor(n){
  return n.person ? ensureColor(n.person) : SELF;
}
function persistPeople(){
  try{
    Office.context.document.settings.set(KEY_PEOPLE, JSON.stringify(people));
    Office.context.document.settings.saveAsync(()=>{});
  }catch(e){}
}
function drawPeople(){
  const el = $('people');
  el.innerHTML = '';
  const none = document.createElement('button');
  none.className = 'chip' + (selPerson === '' ? ' sel' : '');
  none.innerHTML = '<span class="dot" style="background:' + SELF + '"></span>';
  none.appendChild(document.createTextNode(t('myself')));
  none.addEventListener('click', () => { selPerson = ''; drawPeople(); });
  el.appendChild(none);
  Object.keys(people).forEach(name => {
    const c = document.createElement('button');
    c.className = 'chip' + (selPerson === name ? ' sel' : '');
    c.innerHTML = '<span class="dot" style="background:' + people[name] + '"></span>';
    c.appendChild(document.createTextNode(name));
    c.addEventListener('click', () => { selPerson = name; drawPeople(); });
    el.appendChild(c);
  });
  const plus = document.createElement('button');
  plus.className = 'chip'; plus.textContent = '+';
  plus.title = t('addPerson');
  plus.addEventListener('click', () => {
    plus.style.display = 'none';
    inp.style.display = 'inline-block';
    inp.focus();
  });
  el.appendChild(plus);
  const inp = document.createElement('input');
  inp.id = 'newperson'; inp.dir = 'auto'; inp.placeholder = t('personName');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter'){
      const nm = inp.value.trim();
      if (nm){ ensureColor(nm); selPerson = nm; }
      drawPeople(); drawFilter();
    }
    if (e.key === 'Escape') drawPeople();
  });
  el.appendChild(inp);
  updateAddBtnLabel();
  drawFilter();
}
function updateAddBtnLabel(txt){
  $('addbtn').textContent = txt || t('addSlide');
}
function drawFilter(){
  const sel = $('filterPerson');
  const cur = filterP;
  sel.innerHTML = '';
  const o0 = document.createElement('option');
  o0.value = ''; o0.textContent = t('everyone');
  sel.appendChild(o0);
  Object.keys(people).forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });
  sel.value = cur;
}
$('filterPerson').addEventListener('change', async e => { filterP = e.target.value; drawNotes(); await applyFilterPins(); persist(); });

/* ================= selection awareness ================= */
function watchSelection(){
  try{
    Office.context.document.addHandlerAsync(Office.EventType.DocumentSelectionChanged, updateAnchor);
  }catch(e){}
  updateAnchor();
}
async function updateAnchor(){
  if (!ready){ $('anchor').textContent = t('anchorDefault'); return; }
  try{
    await PowerPoint.run(async ctx => {
      const shapes = ctx.presentation.getSelectedShapes();
      shapes.load('items/name');
      await ctx.sync();
      const selName = shapes.items.length ? shapes.items[0].name : null;
      if (selName && selName.indexOf('CriTickPin-') === 0){
        highlightNote(selName.slice('CriTickPin-'.length));
        $('anchor').textContent = t('anchorPin');
        updateAddBtnLabel();
        return;
      }
      clearHighlight();
      reconcilePins();
      if (shapes.items.length){
        const nm = shapes.items[0].name;
        $('anchor').innerHTML = '';
        $('anchor').appendChild(document.createTextNode(t('anchorAttached')));
        const b = document.createElement('b');
        b.textContent = nm;
        $('anchor').appendChild(b);
        updateAddBtnLabel(t('addObject'));
      } else {
        $('anchor').textContent = t('anchorDefault');
        updateAddBtnLabel();
      }
    });
  }catch(e){
    $('anchor').textContent = t('anchorDefault');
  }
}
function highlightNote(uid){
  clearHighlight();
  const row = document.querySelector('.note[data-uid="' + uid + '"]');
  if (row){ row.classList.add('hl'); row.scrollIntoView({block:'nearest'}); }
}
function clearHighlight(){
  document.querySelectorAll('.note.hl').forEach(r => r.classList.remove('hl'));
}

/* ================= slide positions ================= */
async function refreshSlideMap(){
  if (!ready) return;
  try{
    await PowerPoint.run(async ctx => {
      const sl = ctx.presentation.slides;
      sl.load('items/id');
      await ctx.sync();
      slidePos = {};
      sl.items.forEach((s, i) => { slidePos[s.id] = i + 1; });
    });
  }catch(e){}
}

/* ================= pin images ================= */
function pinImageBase64(num, color){
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.beginPath(); g.arc(32, 32, 29, 0, Math.PI * 2);
  g.fillStyle = color; g.fill();
  g.lineWidth = 4; g.strokeStyle = '#FFFFFF'; g.stroke();
  g.fillStyle = '#FFFFFF';
  g.font = 'bold 30px Heebo, Arial, sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(String(num), 32, 34);
  return c.toDataURL('image/png').split(',')[1];
}
function insertPinImage(num, color, left, top, size){
  lastOp = Date.now();
  const px = size || 26;
  return new Promise(resolve => {
    Office.context.document.setSelectedDataAsync(pinImageBase64(num, color), {
      coercionType: Office.CoercionType.Image,
      imageLeft: left, imageTop: top, imageWidth: px, imageHeight: px
    }, r => resolve(r.status === Office.AsyncResultStatus.Succeeded));
  });
}
async function slideShapeNames(slideId){
  let names = [];
  await PowerPoint.run(async ctx => {
    const sl = ctx.presentation.slides.getItem(slideId);
    sl.shapes.load('items/name');
    await ctx.sync();
    names = sl.shapes.items.map(x => x.name);
  });
  return names;
}
async function adoptNewPin(slideId, beforeNames, uid){
  await PowerPoint.run(async ctx => {
    const sl = ctx.presentation.slides.getItem(slideId);
    sl.shapes.load('items/name');
    await ctx.sync();
    const nw = sl.shapes.items.find(x => beforeNames.indexOf(x.name) === -1);
    if (nw) nw.name = 'CriTickPin-' + uid;
    try{ ctx.presentation.setSelectedSlides([slideId]); }catch(e){}
    await ctx.sync();
  });
}
async function removePinImage(note){
  lastOp = Date.now();
  try{
    await PowerPoint.run(async ctx => {
      const slide = ctx.presentation.slides.getItem(note.slideId);
      slide.shapes.load('items/name,items/left,items/top');
      await ctx.sync();
      const sh = slide.shapes.items.find(x => x.name === 'CriTickPin-' + note.uid);
      if (sh){ note.pinLeft = sh.left; note.pinTop = sh.top; sh.delete(); }
      await ctx.sync();
    });
  }catch(e){}
}
async function placePinImage(note){
  lastOp = Date.now();
  try{
    const k = (note.pinNum - 1) % 8;
    const left = (note.pinLeft !== undefined && note.pinLeft !== null) ? note.pinLeft : 14 + k * 30;
    const top = (note.pinTop !== undefined && note.pinTop !== null) ? note.pinTop : 14;
    await PowerPoint.run(async ctx => {
      try{ ctx.presentation.setSelectedSlides([note.slideId]); }catch(e){}
      await ctx.sync();
    });
    const before = await slideShapeNames(note.slideId);
    await insertPinImage(note.pinNum, personColor(note), left, top);
    await adoptNewPin(note.slideId, before, note.uid);
  }catch(e){}
}
function matchesFilter(n){ return !filterP || n.person === filterP; }

async function maybePlace(note){
  if (note.hidden || note.status === 'fixed') return;
  if (matchesFilter(note)){ note.filterHidden = false; await placePinImage(note); }
  else note.filterHidden = true;
}
async function applyFilterPins(){
  for (const n of notes){
    if (n.hidden || n.status === 'fixed') continue;
    if (matchesFilter(n) && n.filterHidden){
      n.filterHidden = false;
      await placePinImage(n);
    } else if (!matchesFilter(n) && !n.filterHidden){
      await removePinImage(n);
      n.filterHidden = true;
    }
  }
}
async function recolorPin(note){
  if (note.hidden || note.filterHidden || note.status === 'fixed') return;
  await removePinImage(note);
  await placePinImage(note);
}
async function syncPinForStatus(n){
  if (n.status === 'fixed'){
    if (!n.hidden && !n.filterHidden) await removePinImage(n);
  } else {
    await maybePlace(n);
  }
}
async function clearAllPins(){
  const affected = notes.filter(n => !n.hidden && !n.filterHidden && n.status === 'open');
  if (!affected.length){ toast(t('tNoPins')); return; }
  try{
    for (const n of affected){
      await removePinImage(n);
      n.hidden = true;
    }
    persist();
    drawNotes();
    pushUndo({type:'clearAll', uids: affected.map(n => n.uid)});
    toast(t('tPinsRemoved')(affected.length));
  }catch(e){ toast(t('tCantRemove')); }
}
$('clearPins').addEventListener('click', clearAllPins);

/* ================= pin-deleted -> note-deleted ================= */
let reconBusy = false;
async function reconcilePins(){
  if (!ready || reconBusy) return;
  if (Date.now() - lastOp < 2500) return;
  const cands = notes.filter(n => n.status === 'open' && !n.hidden && !n.filterHidden && Date.now() - n.ts > 5000);
  if (!cands.length) return;
  reconBusy = true;
  try{
    const bySlide = {};
    cands.forEach(n => { (bySlide[n.slideId] = bySlide[n.slideId] || []).push(n); });
    const gone = [];
    await PowerPoint.run(async ctx => {
      const all = ctx.presentation.slides;
      all.load('items/id');
      await ctx.sync();
      const existing = {};
      all.items.forEach(sl => { existing[sl.id] = true; });
      const loaded = {};
      Object.keys(bySlide).forEach(id => {
        if (!existing[id]) return;
        loaded[id] = ctx.presentation.slides.getItem(id);
        loaded[id].shapes.load('items/name');
      });
      await ctx.sync();
      Object.keys(loaded).forEach(id => {
        const names = loaded[id].shapes.items.map(x => x.name);
        bySlide[id].forEach(n => {
          if (names.indexOf('CriTickPin-' + n.uid) === -1) gone.push(n);
        });
      });
    });
    if (gone.length){
      gone.forEach(n => {
        const idx = notes.indexOf(n);
        if (idx > -1){
          notes.splice(idx, 1);
          pushUndo({type:'delete', note: JSON.parse(JSON.stringify(n))});
        }
      });
      persist();
      drawNotes();
      toast(gone.length === 1 ? t('tGoneOne') : t('tGoneMany')(gone.length));
    }
  }catch(e){}
  reconBusy = false;
}

/* ================= add note ================= */
async function addNote(){
  const text = $('noteinput').value.trim();
  if (!text || !ready) return;
  $('addbtn').disabled = true;
  try{
    let slideId = null, shapeName = null;
    await PowerPoint.run(async ctx => {
      const sel = ctx.presentation.getSelectedSlides();
      sel.load('items/id');
      const shapes = ctx.presentation.getSelectedShapes();
      shapes.load('items/name');
      await ctx.sync();
      slideId = sel.items.length ? sel.items[0].id : null;
      shapeName = (shapes.items.length && shapes.items[0].name.indexOf('CriTickPin-') !== 0) ? shapes.items[0].name : null;
    });
    if (!slideId){ toast(t('tClickSlide')); $('addbtn').disabled = false; return; }
    let pinNum = 0;
    notes.forEach(n => { if (n.pinNum > pinNum) pinNum = n.pinNum; });
    pinNum++;
    const uid = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const note = {uid, pinNum, slideId, shapeName, text, person: selPerson, status: 'open', hidden: false, filterHidden: false, pinLeft: null, pinTop: null, ts: Date.now()};
    notes.push(note);
    await maybePlace(note);
    persist();
    pushUndo({type:'add', uid});
    $('noteinput').value = '';
    await refreshSlideMap();
    drawNotes();
  }catch(e){
    toast(t('tCouldNotAdd'));
  }
  $('addbtn').disabled = false;
  $('noteinput').focus();
}
$('addbtn').addEventListener('click', addNote);
$('noteinput').addEventListener('keydown', e => { if (e.key === 'Enter') addNote(); });

/* ================= list ================= */
function drawNotes(){
  const el = $('notes');
  const openCount = notes.filter(n => n.status === 'open').length;
  const fixedCount = notes.length - openCount;
  $('progress').innerHTML = '';
  if (notes.length){
    $('progress').appendChild(document.createTextNode(openCount + ' ' + t('open') + ' · '));
    const b = document.createElement('b');
    b.textContent = fixedCount + ' ' + t('fixedWord');
    $('progress').appendChild(b);
  }
  drawMeBar();
  const visible = notes.filter(n => !filterP || n.person === filterP);
  if (!visible.length){
    el.innerHTML = '<div class="empty">' + (notes.length ? t('emptyFilter') : t('emptyNew')) + '</div>';
    return;
  }
  const groups = {};
  visible.forEach(n => {
    const p = slidePos[n.slideId] || 9999;
    (groups[p] = groups[p] || []).push(n);
  });
  el.innerHTML = '';
  Object.keys(groups).map(Number).sort((a,b)=>a-b).forEach(p => {
    const head = document.createElement('div');
    head.className = 'slidehead';
    head.textContent = p === 9999 ? t('deletedSlide') : t('slideWord') + ' ' + p;
    if (p !== 9999){
      head.title = t('goSlide') + ' ' + p;
      head.addEventListener('click', () => goTo(groups[p][0].slideId));
    }
    el.appendChild(head);
    groups[p].forEach(n => {
      el.appendChild(buildRow(n, p));
    });
  });
}

function buildRow(n, p){
  const row = document.createElement('div');
  row.className = 'note st-' + n.status;
  row.dataset.uid = n.uid;
  row.innerHTML = '<div class="num"></div>' +
    '<div class="body"><div class="txt"></div><div class="meta"></div></div>' +
    '<div class="acts">' +
      (n.status === 'open' ? '<button class="eye">👁</button>' : '') +
      '<button class="st-btn">👍</button>' +
      '<button class="del">✕</button>' +
    '</div>';
  const num = row.querySelector('.num');
  num.textContent = n.pinNum;
  num.style.background = personColor(n);
  const txtEl = row.querySelector('.txt');
  txtEl.textContent = n.text;
  txtEl.title = t('editTip');
  txtEl.addEventListener('dblclick', e => {
    e.stopPropagation();
    startEdit(n, txtEl);
  });
  const meta = row.querySelector('.meta');
  const assign = document.createElement('span');
  assign.className = 'assign';
  assign.title = t('reassignTip');
  const d = document.createElement('span');
  d.className = 'pdot';
  d.style.background = n.person ? ensureColor(n.person) : SELF;
  assign.appendChild(d);
  assign.appendChild(document.createTextNode(n.person || t('myself')));
  assign.addEventListener('click', e => {
    e.stopPropagation();
    const sel = document.createElement('select');
    sel.className = 'assign-sel';
    const o0 = document.createElement('option');
    o0.value = ''; o0.textContent = t('myself');
    sel.appendChild(o0);
    Object.keys(people).forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name;
      sel.appendChild(o);
    });
    sel.value = n.person;
    sel.addEventListener('click', ev => ev.stopPropagation());
    sel.addEventListener('change', async () => {
      const prev = n.person;
      n.person = sel.value;
      pushUndo({type:'person', uid: n.uid, prev});
      persist();
      await recolorPin(n);
      await applyFilterPins();
      drawNotes();
    });
    sel.addEventListener('blur', () => drawNotes());
    assign.replaceWith(sel);
    sel.focus();
  });
  meta.appendChild(assign);
  meta.appendChild(document.createTextNode(' · '));
  meta.appendChild(document.createTextNode(t('slideMeta') + ' ' + (slidePos[n.slideId] || '?')));
  if (n.status === 'fixed'){
    const st = document.createElement('span');
    st.className = 'st fixed';
    st.textContent = t('fixedLabel');
    meta.appendChild(document.createTextNode(' · '));
    meta.appendChild(st);
  }
  if (n.shapeName){
    const tag = document.createElement('span');
    tag.className = 'tag'; tag.textContent = n.shapeName;
    row.querySelector('.body').appendChild(tag);
  }
  const eye = row.querySelector('.eye');
  if (eye){
    eye.title = t('eyeTip');
    if (n.hidden) eye.classList.add('off');
    eye.addEventListener('click', async e => {
      e.stopPropagation();
      if (n.hidden){ n.hidden = false; await maybePlace(n); pushUndo({type:'show', uid:n.uid}); }
      else { await removePinImage(n); n.hidden = true; pushUndo({type:'hide', uid:n.uid}); }
      persist(); drawNotes();
    });
  }
  const stBtn = row.querySelector('.st-btn');
  stBtn.title = n.status === 'fixed' ? t('reopenTip') : t('fixTip');
  stBtn.addEventListener('click', async e => {
    e.stopPropagation();
    pushUndo({type:'status', uid:n.uid, prev: n.status});
    n.status = n.status === 'fixed' ? 'open' : 'fixed';
    await syncPinForStatus(n);
    persist(); drawNotes();
  });
  const del = row.querySelector('.del');
  del.title = t('delTip');
  del.addEventListener('click', async e => {
    e.stopPropagation();
    await removePinImage(n);
    const idx = notes.indexOf(n);
    if (idx > -1) notes.splice(idx, 1);
    pushUndo({type:'delete', note: JSON.parse(JSON.stringify(n))});
    persist(); drawNotes();
  });
  row.addEventListener('click', () => { if (n.hidden || n.filterHidden || n.status === 'fixed') goTo(n.slideId); else selectPin(n); });
  return row;
}

/* ================= edit note text ================= */
function startEdit(n, txtEl){
  const inp = document.createElement('input');
  inp.className = 'txt-edit';
  inp.dir = 'auto';
  inp.value = n.text;
  inp.addEventListener('click', e => e.stopPropagation());
  const finish = save => {
    const v = inp.value.trim();
    if (save && v && v !== n.text){
      pushUndo({type:'edit', uid:n.uid, prev:n.text});
      n.text = v;
      persist();
    }
    drawNotes();
  };
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish(true);
    if (e.key === 'Escape') finish(false);
  });
  inp.addEventListener('blur', () => finish(true));
  txtEl.replaceWith(inp);
  inp.focus();
  inp.select();
}

/* ================= locate pin ================= */
async function selectPin(n){
  try{
    await PowerPoint.run(async ctx => {
      try{ ctx.presentation.setSelectedSlides([n.slideId]); }catch(e){}
      const sl = ctx.presentation.slides.getItem(n.slideId);
      sl.shapes.load('items/name,items/id');
      await ctx.sync();
      const sh = sl.shapes.items.find(x => x.name === 'CriTickPin-' + n.uid);
      if (sh){ try{ ctx.presentation.setSelectedShapes([sh.id]); }catch(e){} }
      await ctx.sync();
    });
    await flashPin(n);
  }catch(e){ goTo(n.slideId); }
}
async function flashPin(n){
  try{
    await removePinImage(n);
    if (n.pinLeft === null || n.pinLeft === undefined){ await placePinImage(n); return; }
    const grow = 8;
    const before = await slideShapeNames(n.slideId);
    await insertPinImage(n.pinNum, personColor(n), n.pinLeft - grow, n.pinTop - grow, 26 + grow * 2);
    await adoptNewPin(n.slideId, before, n.uid);
    await new Promise(r => setTimeout(r, 650));
    await removePinImage(n);
    n.pinLeft += grow; n.pinTop += grow;
    await placePinImage(n);
  }catch(e){}
}
async function goTo(slideId){
  if (!slidePos[slideId]) return;
  try{
    await PowerPoint.run(async ctx => {
      ctx.presentation.setSelectedSlides([slideId]);
      await ctx.sync();
    });
  }catch(e){}
}

/* ================= undo ================= */
function pushUndo(entry){
  undoStack.push(entry);
  if (undoStack.length > 30) undoStack.shift();
}
function findNote(uid){ return notes.find(n => n.uid === uid); }

async function undo(){
  const e = undoStack.pop();
  if (!e){ toast(t('tNothingUndo')); return; }
  try{
    if (e.type === 'add'){
      const n = findNote(e.uid);
      if (n){ await removePinImage(n); notes.splice(notes.indexOf(n), 1); }
    }
    else if (e.type === 'delete'){
      notes.push(e.note);
      await maybePlace(e.note);
    }
    else if (e.type === 'person'){
      const n = findNote(e.uid);
      if (n){ n.person = e.prev; await recolorPin(n); await applyFilterPins(); }
    }
    else if (e.type === 'edit'){
      const n = findNote(e.uid);
      if (n) n.text = e.prev;
    }
    else if (e.type === 'status'){
      const n = findNote(e.uid);
      if (n){ n.status = e.prev; await syncPinForStatus(n); }
    }
    else if (e.type === 'hide'){
      const n = findNote(e.uid);
      if (n){ n.hidden = false; await maybePlace(n); }
    }
    else if (e.type === 'show'){
      const n = findNote(e.uid);
      if (n){ await removePinImage(n); n.hidden = true; }
    }
    else if (e.type === 'clearAll'){
      for (const uid of e.uids){
        const n = findNote(uid);
        if (n){ n.hidden = false; await maybePlace(n); }
      }
    }
    persist();
    await refreshSlideMap();
    drawNotes();
    toast(t('tUndone'));
  }catch(err){ toast(t('tCantUndo')); }
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z'){
    if (e.target.tagName === 'INPUT' && e.target.value) return;
    e.preventDefault();
    undo();
  }
});

/* ================= persistence ================= */
function persist(){
  try{
    Office.context.document.settings.set(KEY, JSON.stringify(notes));
    Office.context.document.settings.saveAsync(res => {
      $('savedflag').textContent = res.status === Office.AsyncResultStatus.Succeeded
        ? t('saved')
        : '';
    });
  }catch(e){}
}

/* ================= copy for Claude ================= */
async function resolveAnchors(openNotes){
  const res = {};
  const bySlide = {};
  openNotes.forEach(n => {
    if (!n.hidden && !n.filterHidden) (bySlide[n.slideId] = bySlide[n.slideId] || []).push(n);
  });
  if (!Object.keys(bySlide).length) return res;
  try{
    await PowerPoint.run(async ctx => {
      const all = ctx.presentation.slides;
      all.load('items/id');
      await ctx.sync();
      const existing = {};
      all.items.forEach(sl => { existing[sl.id] = true; });
      const loaded = {};
      Object.keys(bySlide).forEach(id => {
        if (!existing[id]) return;
        loaded[id] = ctx.presentation.slides.getItem(id);
        loaded[id].shapes.load('items/name,items/left,items/top,items/width,items/height');
      });
      await ctx.sync();
      Object.keys(loaded).forEach(id => {
        const items = loaded[id].shapes.items;
        bySlide[id].forEach(n => {
          const pin = items.find(x => x.name === 'CriTickPin-' + n.uid);
          if (!pin) return;
          const cx = pin.left + pin.width / 2;
          const cy = pin.top + pin.height / 2;
          const hits = items.filter(x =>
            x.name.indexOf('CriTickPin-') !== 0 &&
            cx >= x.left && cx <= x.left + x.width &&
            cy >= x.top && cy <= x.top + x.height);
          let obj = null;
          if (hits.length){
            hits.sort((a, b) => (a.width * a.height) - (b.width * b.height));
            obj = hits[0].name;
          }
          const W = 960, H = 540;
          const col = cx < W / 3 ? 'left' : (cx > 2 * W / 3 ? 'right' : 'center');
          const rowp = cy < H / 3 ? 'top' : (cy > 2 * H / 3 ? 'bottom' : 'middle');
          res[n.uid] = {obj: obj, region: rowp + ' ' + col};
        });
      });
    });
  }catch(e){}
  return res;
}

function claudePrompt(anchors){
  const open = notes.filter(n => n.status === 'open');
  const groups = {};
  open.forEach(n => {
    const p = slidePos[n.slideId] || 0;
    (groups[p] = groups[p] || []).push(n);
  });
  let out = 'Please apply the following corrections to this presentation. ';
  out += 'Go slide by slide and make only the changes listed. ';
  out += 'Ignore the small numbered circle images named CriTickPin-* \u2014 do not move, edit, or delete them. ';
  out += 'If a correction is ambiguous or impossible, skip it and say so at the end.\n';
  Object.keys(groups).map(Number).sort((a,b)=>a-b).forEach(p => {
    out += '\nSlide ' + (p || '(unknown)') + ':\n';
    groups[p].forEach(n => {
      const a = anchors[n.uid] || {};
      let where = '';
      if (n.shapeName) where = 'On the object named "' + n.shapeName + '": ';
      else if (a.obj) where = 'On the object named "' + a.obj + '" (the pin sits on it): ';
      else if (a.region) where = 'In the ' + a.region + ' area of the slide: ';
      out += '- ' + where + n.text + '\n';
    });
  });
  out += '\nWhen finished, list what you changed and anything you skipped.';
  return out;
}
$('copyClaude').addEventListener('click', async () => {
  const open = notes.filter(n => n.status === 'open');
  if (!open.length){ toast(t('tNothingOpen')); return; }
  await refreshSlideMap();
  const anchors = await resolveAnchors(open);
  const box = $('claudebox'), ta = $('claudetext');
  ta.value = claudePrompt(anchors);
  $('claudehint').textContent = t('copyHint');
  box.classList.add('on');
  ta.focus();
  ta.select();
  try{ navigator.clipboard.writeText(ta.value).catch(()=>{}); }catch(e){}
});
$('claudetext').addEventListener('keydown', e => {
  if (e.key === 'Escape') $('claudebox').classList.remove('on');
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'c'){
    setTimeout(() => { $('claudebox').classList.remove('on'); toast(t('tClaudeCopied')); }, 150);
  }
});
$('claudebox').addEventListener('click', e => {
  if (e.target === $('claudebox')) $('claudebox').classList.remove('on');
});

/* ================= toast ================= */
let toastT = null;
function toast(msg){
  const t2 = $('toast'); t2.textContent = msg; t2.classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(()=>t2.classList.remove('on'), 2200);
}
