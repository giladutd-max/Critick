<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CriTick</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF9F6; --panel:#FFFFFF; --ink:#1C1B1A; --muted:#8A867E; --line:#E7E4DD;
    --pin:#A83254; --pin-soft:#F7E6EC; --done:#2E7D5B; --done-soft:#E4F0EA; --amber:#B45309;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:'Heebo',system-ui,sans-serif; background:var(--bg); color:var(--ink); font-size:14px; display:flex; flex-direction:column;}

  header{padding:12px 14px 10px; background:var(--panel); border-bottom:1px solid var(--line);}
  header .brand{font-weight:700; font-size:16px;}
  header .brand span{color:var(--pin);}
  header .sub{font-size:11px; color:var(--muted); margin-top:2px;}

  #composerbox{padding:12px 14px 10px; background:var(--panel); border-bottom:1px solid var(--line);}
  #anchor{font-size:11px; color:var(--muted); margin-bottom:6px; min-height:15px;}
  #anchor b{color:var(--pin); font-weight:500;}
  #noteinput{width:100%; font-family:inherit; font-size:14px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; outline:none; background:var(--bg);}
  #noteinput:focus{border-color:var(--pin);}
  #people{display:flex; gap:6px; overflow-x:auto; padding:8px 0 2px; scrollbar-width:thin;}
  .chip{flex:none; display:flex; align-items:center; gap:5px; font-size:11px; border:1px solid var(--line); border-radius:12px; padding:3px 9px; cursor:pointer; background:var(--panel); font-family:inherit; color:var(--ink);}
  .chip .dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .chip.sel{border-color:var(--ink); background:var(--bg); font-weight:500;}
  #newperson{width:80px; font-family:inherit; font-size:11px; border:1px solid var(--line); border-radius:12px; padding:3px 9px; outline:none; display:none;}
  #addbtn{width:100%; margin-top:8px; font-family:inherit; font-size:13px; font-weight:500; background:var(--ink); color:#fff; border:none; border-radius:8px; padding:8px; cursor:pointer;}
  #addbtn:hover{background:#333;}
  #addbtn:disabled{opacity:.5; cursor:default;}

  #filterbar{display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--panel); border-bottom:1px solid var(--line);}
  #filterbar label{font-size:11px; color:var(--muted);}
  #filterPerson{flex:1; font-family:inherit; font-size:12px; border:1px solid var(--line); border-radius:8px; padding:4px 6px; background:var(--bg); outline:none;}

  #notes{flex:1; overflow-y:auto;}
  .slidehead{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; padding:12px 14px 4px; cursor:pointer;}
  .slidehead:hover{color:var(--pin);}
  .empty{padding:32px 18px; color:var(--muted); font-size:13px; line-height:1.7; text-align:center;}
  .note{display:flex; gap:8px; padding:8px 14px; align-items:flex-start; cursor:pointer;}
  .note:hover{background:var(--pin-soft);}
  .note.hl{background:var(--pin-soft); box-shadow:inset 3px 0 0 var(--pin);}
  .note .num{flex:none; width:20px; height:20px; border-radius:50%; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .note .body{flex:1; min-width:0;}
  .note .txt{font-size:13px; line-height:1.45; word-wrap:break-word; unicode-bidi:plaintext;}
  .note.st-fixed .txt, .note.st-canceled .txt{color:var(--muted); text-decoration:line-through;}
  .note .meta{font-size:11px; color:var(--muted); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap;}
  .note .meta .pdot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .note .meta .st{font-weight:500;}
  .note .st.fixed{color:var(--done);}
  .note .st.canceled{color:var(--muted);}
  .note .st.question{color:var(--amber);}
  .note .tag{display:inline-block; font-size:10px; color:var(--muted); background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:0 5px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .note .acts{flex:none; display:flex; gap:0;}
  .note .acts button{border:none; background:none; padding:2px 3px; font-size:13px; color:var(--muted); cursor:pointer; font-family:inherit; line-height:1;}
  .note .acts button:hover{color:var(--ink);}
  .note .acts .eye.off{opacity:.35;}
  .note .acts .st-btn:hover{color:var(--done);}
  .note .acts .del:hover{color:var(--pin);}

  footer{padding:10px 14px; background:var(--panel); border-top:1px solid var(--line);}
  footer .row{display:flex; gap:8px;}
  footer .row + .row{margin-top:6px;}
  footer button{flex:1; font-family:inherit; font-size:12px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:6px; cursor:pointer; color:var(--ink);}
  footer button:hover{border-color:#C9C5BC;}
  #savedflag{font-size:10px; color:var(--muted); text-align:center; margin-top:6px; min-height:13px;}

  #toast{position:fixed; bottom:64px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:12px; padding:6px 14px; border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:99; white-space:nowrap;}
  #toast.on{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="brand">Cri<span>Tick</span></div>
  <div class="sub">Corrections are saved inside this presentation</div>
</header>

<div id="composerbox">
  <div id="anchor">A numbered pin will be added to the slide — drag it into place</div>
  <input id="noteinput" type="text" dir="auto" placeholder="Write the correction… (Enter to add)">
  <div id="people"></div>
  <button id="addbtn">Add to this slide</button>
</div>

<div id="filterbar">
  <label for="filterPerson">Show</label>
  <select id="filterPerson"><option value="">Everyone</option></select>
</div>

<div id="notes"></div>

<footer>
  <div class="row">
    <button id="undoBtn" title="Undo last action (Cmd+Z)">↶ Undo</button>
    <button id="copyList">Copy list</button>
    <button id="dlList">Download .txt</button>
  </div>
  <div class="row">
    <button id="clearPins" title="Delete all CriTick pins from the slides (notes stay)">Remove pins from slides</button>
  </div>
  <div id="savedflag"></div>
</footer>

<div id="toast"></div>

<script>
const KEY = 'critick-notes';
const KEY_PEOPLE = 'critick-people';
const PIN = '#A83254', PIN_GREY = '#8A867E', PIN_AMBER = '#D9A21B';
const ROSTER = {
  'Gilad':'#A83254','Noa':'#2563EB','Issi':'#0E9F6E','Merav':'#D97706','Daniel':'#7C3AED',
  'Maya':'#DB2777','Adi':'#0891B2','Tsofit':'#65A30D','Michal':'#92400E'
};
// notes: {uid, pinNum, slideId, shapeName, text, person, status, hidden, pinLeft, pinTop, ts}
let notes = [];
let people = {};
let slidePos = {};
let ready = false;
let selPerson = '';
let filterP = '';
let undoStack = [];

const $ = id => document.getElementById(id);

/* ================= boot ================= */
Office.onReady(info => {
  if (info.host !== Office.HostType.PowerPoint){
    document.querySelector('header .sub').textContent = 'CriTick runs inside PowerPoint';
    return;
  }
  ready = true;
  try{
    const raw = Office.context.document.settings.get(KEY);
    if (raw) notes = JSON.parse(raw);
  }catch(e){}
  try{
    const rawP = Office.context.document.settings.get(KEY_PEOPLE);
    if (rawP) people = JSON.parse(rawP);
  }catch(e){}
  Object.keys(ROSTER).forEach(n => { if (!people[n]) people[n] = ROSTER[n]; });
  // migrate old notes
  let mx = 0;
  notes.forEach(n => { if (n.pinNum > mx) mx = n.pinNum; });
  notes.forEach(n => {
    if (!n.pinNum) n.pinNum = ++mx;
    if (!n.uid) n.uid = 'm' + n.ts;
    if (!n.status) n.status = n.done ? 'fixed' : 'open';
    delete n.done;
    if (n.person === undefined) n.person = '';
    if (n.hidden === undefined) n.hidden = false;
  });
  drawPeople();
  refreshSlideMap().then(drawNotes);
  watchSelection();
});

/* ================= people & colors ================= */
function hashColor(name){
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return 'hsl(' + (h % 360) + ' 62% 38%)';
}
function ensureColor(name){
  if (!people[name]){ people[name] = hashColor(name); persistPeople(); }
  return people[name];
}
function personColor(n){
  if (n.status === 'fixed' || n.status === 'canceled') return PIN_GREY;
  if (n.status === 'question') return PIN_AMBER;
  return n.person ? ensureColor(n.person) : PIN;
}
function persistPeople(){
  try{
    Office.context.document.settings.set(KEY_PEOPLE, JSON.stringify(people));
    Office.context.document.settings.saveAsync(()=>{});
  }catch(e){}
}
function drawPeople(){
  const el = $('people');
  el.innerHTML = '';
  const none = document.createElement('button');
  none.className = 'chip' + (selPerson === '' ? ' sel' : '');
  none.innerHTML = '<span class="dot" style="background:' + PIN + '"></span>No one';
  none.addEventListener('click', () => { selPerson = ''; drawPeople(); });
  el.appendChild(none);
  Object.keys(people).forEach(name => {
    const c = document.createElement('button');
    c.className = 'chip' + (selPerson === name ? ' sel' : '');
    c.innerHTML = '<span class="dot" style="background:' + people[name] + '"></span>';
    c.appendChild(document.createTextNode(name));
    c.addEventListener('click', () => { selPerson = name; drawPeople(); });
    el.appendChild(c);
  });
  const plus = document.createElement('button');
  plus.className = 'chip'; plus.textContent = '+';
  plus.title = 'Add a person';
  plus.addEventListener('click', () => {
    plus.style.display = 'none';
    inp.style.display = 'inline-block';
    inp.focus();
  });
  el.appendChild(plus);
  const inp = document.createElement('input');
  inp.id = 'newperson'; inp.dir = 'auto'; inp.placeholder = 'Name';
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter'){
      const nm = inp.value.trim();
      if (nm){ ensureColor(nm); selPerson = nm; }
      drawPeople(); drawFilter();
    }
    if (e.key === 'Escape') drawPeople();
  });
  el.appendChild(inp);
  drawFilter();
}
function drawFilter(){
  const sel = $('filterPerson');
  const cur = filterP;
  sel.innerHTML = '<option value="">Everyone</option>';
  Object.keys(people).forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });
  sel.value = cur;
}
$('filterPerson').addEventListener('change', e => { filterP = e.target.value; drawNotes(); });

/* ================= selection awareness ================= */
function watchSelection(){
  try{
    Office.context.document.addHandlerAsync(Office.EventType.DocumentSelectionChanged, updateAnchor);
  }catch(e){}
  updateAnchor();
}
async function updateAnchor(){
  try{
    await PowerPoint.run(async ctx => {
      const shapes = ctx.presentation.getSelectedShapes();
      shapes.load('items/name');
      await ctx.sync();
      const selName = shapes.items.length ? shapes.items[0].name : null;
      if (selName && selName.indexOf('CriTickPin-') === 0){
        highlightNote(selName.slice('CriTickPin-'.length));
        $('anchor').textContent = 'Pin selected';
        $('addbtn').textContent = 'Add to this slide';
        return;
      }
      clearHighlight();
      if (shapes.items.length){
        const nm = shapes.items[0].name;
        $('anchor').innerHTML = 'Attached to: <b></b>';
        $('anchor').querySelector('b').textContent = nm;
        $('addbtn').textContent = 'Add note on this object';
      } else {
        $('anchor').textContent = 'A numbered pin will be added to the slide — drag it into place';
        $('addbtn').textContent = 'Add to this slide';
      }
    });
  }catch(e){
    $('anchor').textContent = 'A numbered pin will be added to the slide — drag it into place';
  }
}
function highlightNote(uid){
  clearHighlight();
  const row = document.querySelector('.note[data-uid="' + uid + '"]');
  if (row){ row.classList.add('hl'); row.scrollIntoView({block:'nearest'}); }
}
function clearHighlight(){
  document.querySelectorAll('.note.hl').forEach(r => r.classList.remove('hl'));
}

/* ================= slide positions ================= */
async function refreshSlideMap(){
  if (!ready) return;
  try{
    await PowerPoint.run(async ctx => {
      const sl = ctx.presentation.slides;
      sl.load('items/id');
      await ctx.sync();
      slidePos = {};
      sl.items.forEach((s, i) => { slidePos[s.id] = i + 1; });
    });
  }catch(e){}
}

/* ================= pin images ================= */
function pinImageBase64(num, color){
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.beginPath(); g.arc(32, 32, 29, 0, Math.PI * 2);
  g.fillStyle = color; g.fill();
  g.lineWidth = 4; g.strokeStyle = '#FFFFFF'; g.stroke();
  g.fillStyle = '#FFFFFF';
  g.font = 'bold 30px Heebo, Arial, sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(String(num), 32, 34);
  return c.toDataURL('image/png').split(',')[1];
}
function insertPinImage(num, color, left, top){
  return new Promise(resolve => {
    Office.context.document.setSelectedDataAsync(pinImageBase64(num, color), {
      coercionType: Office.CoercionType.Image,
      imageLeft: left, imageTop: top, imageWidth: 26, imageHeight: 26
    }, r => resolve(r.status === Office.AsyncResultStatus.Succeeded));
  });
}
async function slideShapeNames(slideId){
  let names = [];
  await PowerPoint.run(async ctx => {
    const sl = ctx.presentation.slides.getItem(slideId);
    sl.shapes.load('items/name');
    await ctx.sync();
    names = sl.shapes.items.map(x => x.name);
  });
  return names;
}
async function adoptNewPin(slideId, beforeNames, uid){
  await PowerPoint.run(async ctx => {
    const sl = ctx.presentation.slides.getItem(slideId);
    sl.shapes.load('items/name');
    await ctx.sync();
    const nw = sl.shapes.items.find(x => beforeNames.indexOf(x.name) === -1);
    if (nw) nw.name = 'CriTickPin-' + uid;
    try{ ctx.presentation.setSelectedSlides([slideId]); }catch(e){}
    await ctx.sync();
  });
}
// capture the pin's current position into the note, then delete the image
async function removePinImage(note){
  try{
    await PowerPoint.run(async ctx => {
      const slide = ctx.presentation.slides.getItem(note.slideId);
      slide.shapes.load('items/name,items/left,items/top');
      await ctx.sync();
      const sh = slide.shapes.items.find(x => x.name === 'CriTickPin-' + note.uid);
      if (sh){ note.pinLeft = sh.left; note.pinTop = sh.top; sh.delete(); }
      await ctx.sync();
    });
  }catch(e){}
}
async function placePinImage(note){
  try{
    const k = (note.pinNum - 1) % 8;
    const left = (note.pinLeft !== undefined && note.pinLeft !== null) ? note.pinLeft : 14 + k * 30;
    const top = (note.pinTop !== undefined && note.pinTop !== null) ? note.pinTop : 14;
    await PowerPoint.run(async ctx => {
      try{ ctx.presentation.setSelectedSlides([note.slideId]); }catch(e){}
      await ctx.sync();
    });
    const before = await slideShapeNames(note.slideId);
    await insertPinImage(note.pinNum, personColor(note), left, top);
    await adoptNewPin(note.slideId, before, note.uid);
  }catch(e){}
}
async function recolorPin(note){
  if (note.hidden) return;
  await removePinImage(note);
  await placePinImage(note);
}
async function clearAllPins(){
  const affected = notes.filter(n => !n.hidden);
  if (!affected.length){ toast('No pins on the slides'); return; }
  try{
    for (const n of affected){
      await removePinImage(n);
      n.hidden = true;
    }
    persist();
    drawNotes();
    pushUndo({type:'clearAll', uids: affected.map(n => n.uid)});
    toast(affected.length + ' pins removed — notes kept');
  }catch(e){ toast('Could not remove pins'); }
}
$('clearPins').addEventListener('click', clearAllPins);

/* ================= add note ================= */
async function addNote(){
  const text = $('noteinput').value.trim();
  if (!text || !ready) return;
  $('addbtn').disabled = true;
  try{
    let slideId = null, shapeName = null;
    await PowerPoint.run(async ctx => {
      const sel = ctx.presentation.getSelectedSlides();
      sel.load('items/id');
      const shapes = ctx.presentation.getSelectedShapes();
      shapes.load('items/name');
      await ctx.sync();
      slideId = sel.items.length ? sel.items[0].id : null;
      shapeName = (shapes.items.length && shapes.items[0].name.indexOf('CriTickPin-') !== 0) ? shapes.items[0].name : null;
    });
    if (!slideId){ toast('Click a slide first'); $('addbtn').disabled = false; return; }
    let pinNum = 0;
    notes.forEach(n => { if (n.pinNum > pinNum) pinNum = n.pinNum; });
    pinNum++;
    const uid = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const note = {uid, pinNum, slideId, shapeName, text, person: selPerson, status: 'open', hidden: false, pinLeft: null, pinTop: null, ts: Date.now()};
    notes.push(note);
    await placePinImage(note);
    persist();
    pushUndo({type:'add', uid});
    $('noteinput').value = '';
    await refreshSlideMap();
    drawNotes();
  }catch(e){
    toast('Could not add the note — try again');
  }
  $('addbtn').disabled = false;
  $('noteinput').focus();
}
$('addbtn').addEventListener('click', addNote);
$('noteinput').addEventListener('keydown', e => { if (e.key === 'Enter') addNote(); });

/* ================= list ================= */
const STATUS_ORDER = ['open','fixed','canceled','question'];
const STATUS_LABEL = {open:'', fixed:'✓ fixed', canceled:'✗ canceled', question:'???'};

function drawNotes(){
  const el = $('notes');
  const visible = notes.filter(n => !filterP || n.person === filterP);
  if (!visible.length){
    el.innerHTML = '<div class="empty">' + (notes.length
      ? 'No notes for this filter.'
      : 'Write a correction and press Enter —<br>a numbered pin appears on the slide.<br>Drag it to the exact spot.') + '</div>';
    return;
  }
  const groups = {};
  visible.forEach(n => {
    const p = slidePos[n.slideId] || 9999;
    (groups[p] = groups[p] || []).push(n);
  });
  el.innerHTML = '';
  Object.keys(groups).map(Number).sort((a,b)=>a-b).forEach(p => {
    const head = document.createElement('div');
    head.className = 'slidehead';
    head.textContent = p === 9999 ? 'Deleted slide' : 'Slide ' + p;
    if (p !== 9999){
      head.title = 'Go to slide ' + p;
      head.addEventListener('click', () => goTo(groups[p][0].slideId));
    }
    el.appendChild(head);
    groups[p].forEach(n => {
      const row = document.createElement('div');
      row.className = 'note st-' + n.status;
      row.dataset.uid = n.uid;
      row.innerHTML = '<div class="num"></div>' +
        '<div class="body"><div class="txt"></div><div class="meta"></div></div>' +
        '<div class="acts">' +
          '<button class="eye" title="Hide/show the pin on the slide">👁</button>' +
          '<button class="st-btn" title="Cycle status: open → fixed → canceled → ???">✓</button>' +
          '<button class="del" title="Delete note">✕</button>' +
        '</div>';
      const num = row.querySelector('.num');
      num.textContent = n.pinNum;
      num.style.background = personColor(n);
      row.querySelector('.txt').textContent = n.text;
      const meta = row.querySelector('.meta');
      if (n.person){
        const d = document.createElement('span');
        d.className = 'pdot'; d.style.background = ensureColor(n.person);
        meta.appendChild(d);
        meta.appendChild(document.createTextNode(n.person));
        meta.appendChild(document.createTextNode(' · '));
      }
      meta.appendChild(document.createTextNode('slide ' + (slidePos[n.slideId] || '?')));
      if (STATUS_LABEL[n.status]){
        const st = document.createElement('span');
        st.className = 'st ' + n.status;
        st.textContent = STATUS_LABEL[n.status];
        meta.appendChild(document.createTextNode(' · '));
        meta.appendChild(st);
      }
      if (n.shapeName){
        const tag = document.createElement('span');
        tag.className = 'tag'; tag.textContent = n.shapeName;
        row.querySelector('.body').appendChild(tag);
      }
      const eye = row.querySelector('.eye');
      if (n.hidden) eye.classList.add('off');
      row.addEventListener('click', () => goTo(n.slideId));
      eye.addEventListener('click', async e => {
        e.stopPropagation();
        if (n.hidden){ n.hidden = false; await placePinImage(n); pushUndo({type:'show', uid:n.uid}); }
        else { await removePinImage(n); n.hidden = true; pushUndo({type:'hide', uid:n.uid}); }
        persist(); drawNotes();
      });
      row.querySelector('.st-btn').addEventListener('click', async e => {
        e.stopPropagation();
        const prev = n.status;
        n.status = STATUS_ORDER[(STATUS_ORDER.indexOf(n.status) + 1) % STATUS_ORDER.length];
        pushUndo({type:'status', uid:n.uid, prev});
        persist(); drawNotes();
        await recolorPin(n);
      });
      row.querySelector('.del').addEventListener('click', async e => {
        e.stopPropagation();
        await removePinImage(n);
        const idx = notes.indexOf(n);
        if (idx > -1) notes.splice(idx, 1);
        pushUndo({type:'delete', note: JSON.parse(JSON.stringify(n))});
        persist(); drawNotes();
      });
      el.appendChild(row);
    });
  });
}

async function goTo(slideId){
  if (!slidePos[slideId]) return;
  try{
    await PowerPoint.run(async ctx => {
      ctx.presentation.setSelectedSlides([slideId]);
      await ctx.sync();
    });
  }catch(e){}
}

/* ================= undo ================= */
function pushUndo(entry){
  undoStack.push(entry);
  if (undoStack.length > 30) undoStack.shift();
}
function findNote(uid){ return notes.find(n => n.uid === uid); }

async function undo(){
  const e = undoStack.pop();
  if (!e){ toast('Nothing to undo'); return; }
  try{
    if (e.type === 'add'){
      const n = findNote(e.uid);
      if (n){ await removePinImage(n); notes.splice(notes.indexOf(n), 1); }
    }
    else if (e.type === 'delete'){
      notes.push(e.note);
      if (!e.note.hidden) await placePinImage(e.note);
    }
    else if (e.type === 'status'){
      const n = findNote(e.uid);
      if (n){ n.status = e.prev; await recolorPin(n); }
    }
    else if (e.type === 'hide'){
      const n = findNote(e.uid);
      if (n){ n.hidden = false; await placePinImage(n); }
    }
    else if (e.type === 'show'){
      const n = findNote(e.uid);
      if (n){ await removePinImage(n); n.hidden = true; }
    }
    else if (e.type === 'clearAll'){
      for (const uid of e.uids){
        const n = findNote(uid);
        if (n){ n.hidden = false; await placePinImage(n); }
      }
    }
    persist();
    await refreshSlideMap();
    drawNotes();
    toast('Undone');
  }catch(err){ toast('Could not undo'); }
}
$('undoBtn').addEventListener('click', undo);
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z'){
    if (e.target.tagName === 'INPUT' && e.target.value) return;
    e.preventDefault();
    undo();
  }
});

/* ================= persistence ================= */
function persist(){
  try{
    Office.context.document.settings.set(KEY, JSON.stringify(notes));
    Office.context.document.settings.saveAsync(res => {
      $('savedflag').textContent = res.status === Office.AsyncResultStatus.Succeeded
        ? 'Saved in this file · save the presentation to keep it'
        : '';
    });
  }catch(e){}
}

/* ================= export ================= */
function listText(){
  let out = 'Corrections\n' + new Date().toLocaleDateString() + '\n';
  const mark = {open:'[ ]', fixed:'[v]', canceled:'[x]', question:'[?]'};
  const groups = {};
  notes.forEach(n => {
    const p = slidePos[n.slideId] || 9999;
    (groups[p] = groups[p] || []).push(n);
  });
  Object.keys(groups).map(Number).sort((a,b)=>a-b).forEach(p => {
    out += '\nSlide ' + (p === 9999 ? '(deleted)' : p) + '\n';
    groups[p].forEach(n => {
      out += '  ' + mark[n.status] + ' ' + n.pinNum + '. '
        + (n.person ? n.person + ' — ' : '')
        + (n.shapeName ? '[' + n.shapeName + '] ' : '')
        + n.text + '\n';
    });
  });
  const open = notes.filter(n => n.status === 'open' || n.status === 'question').length;
  out += '\n' + notes.length + ' corrections · ' + open + ' still open\n';
  return out;
}
$('copyList').addEventListener('click', async () => {
  if (!notes.length){ toast('No corrections yet'); return; }
  await refreshSlideMap();
  const t = listText();
  try{ await navigator.clipboard.writeText(t); toast('List copied'); }
  catch(e){
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    toast('List copied');
  }
});
$('dlList').addEventListener('click', async () => {
  if (!notes.length){ toast('No corrections yet'); return; }
  await refreshSlideMap();
  const blob = new Blob([listText()], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'corrections.txt';
  a.click();
  URL.revokeObjectURL(a.href);
});

/* ================= toast ================= */
let toastT = null;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('on'), 2200);
}
</script>
